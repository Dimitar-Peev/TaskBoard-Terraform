services:
    taskboard:
        ports:
            - 5000:80
        container_name: web_app
        restart: on-failure
        networks:
            - taskboard_network
        image: mctrix87/taskboard:0.0.2
    server:
        environment:
            - ACCEPT_EULA=Y
            - MSSQL_SA_PASSWORD=MyStr0ng!Pass
        ports:
            - 1433:1433
        volumes:
            - sqldata:/var/opt/mssql
        networks:
            - taskboard_network
        container_name: sqlserver
        image: mcr.microsoft.com/mssql/server
networks:
    taskboard_network:
      name: taskboard_network
volumes:
    sqldata: 
      name: sqldata